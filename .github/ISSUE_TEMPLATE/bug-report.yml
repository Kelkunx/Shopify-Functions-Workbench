name: Bug report
description: Report a reproducible problem in Shopify Functions Workbench
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please include exact local setup details and whether the issue happens in Mock mode or Shopify mode.
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, npm version, and whether you use WSL
      placeholder: Ubuntu 24.04, Node 20.19, npm 10, WSL2
    validations:
      required: true
  - type: dropdown
    id: runner_mode
    attributes:
      label: Runner mode
      options:
        - Shopify
        - Mock
        - Both
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start the app with npm run dev
        2. Switch to Shopify mode
        3. Fill functionDir and target
        4. Click Run
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste runner errors, diagnostics, or terminal output if available
